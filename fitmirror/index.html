<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitMirror</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="main-canvas"></canvas>
  <video id="webcam-video" autoplay playsinline muted hidden></video>
  <div id="ui-overlay">
    <p>FitMirror loading...</p>
    <div id="outfit-selector">
      <button type="button" class="control-btn" onclick="prevOutfit()" aria-label="Previous outfit">←</button>
      <span id="outfit-name">T-Shirt</span>
      <button type="button" class="control-btn" onclick="nextOutfit()" aria-label="Next outfit">→</button>
    </div>
    <div id="position-controls">
      <div class="scale-buttons">
        <button type="button" class="control-btn" onclick="scaleOutfit('up')" aria-label="Scale up">+</button>
        <button type="button" class="control-btn" onclick="scaleOutfit('down')" aria-label="Scale down">−</button>
      </div>
      <div class="dpad-grid">
        <button type="button" class="control-btn dpad-up" onclick="moveOutfit('up')" aria-label="Move up">↑</button>
        <button type="button" class="control-btn dpad-left" onclick="moveOutfit('left')" aria-label="Move left">←</button>
        <button type="button" class="control-btn dpad-reset" onclick="resetOutfit()" aria-label="Reset position and scale">⟲</button>
        <button type="button" class="control-btn dpad-right" onclick="moveOutfit('right')" aria-label="Move right">→</button>
        <button type="button" class="control-btn dpad-down" onclick="moveOutfit('down')" aria-label="Move down">↓</button>
      </div>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
